name: Deploy site to FTP (cPanel) with diagnostics (defaults to FTP home)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Show remote pwd and listing (diagnostic)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}   # Username
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          HOST="${FTP_HOST:?need FTP_HOST secret}"
          USER="${FTP_USER:?need FTP_USER secret}"
          PASS="${FTP_PASSWORD:?need FTP_PASSWORD secret}"
          PORT="${FTP_PORT:-21}"
          echo "Diagnostic: connecting to $HOST:$PORT as $USER"
          lftp -u "$USER","$PASS" -e "\
            set ftp:ssl-allow true; \
            set ssl:verify-certificate no; \
            set ftp:passive-mode true; \
            pwd; ls -la; bye" "ftp://$HOST:$PORT"

      - name: Deploy (dry-run mirror to FTP home)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          HOST="${FTP_HOST:?need FTP_HOST secret}"
          USER="${FTP_USER:?need FTP_USER secret}"
          PASS="${FTP_PASSWORD:?need FTP_PASSWORD secret}"
          PORT="${FTP_PORT:-21}"
          TARGET_DIR="/"
          echo "Dry-run deploy to $HOST:$PORT -> $TARGET_DIR (mirror --dry-run)"
          lftp -u "$USER","$PASS" -e "\
            set ftp:ssl-allow true; \
            set ssl:verify-certificate no; \
            set ftp:passive-mode true; \
            set net:max-retries 2; \
            set net:timeout 20; \
            mirror -R --delete --verbose --dry-run ./ \"$TARGET_DIR\"; \
            bye" "ftp://$HOST:$PORT"
